name: Release Helm Charts

on:
  push:
    branches:
      - master
    paths:
      - 'charts/**'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Package changed charts
        run: |
          # Package all charts (helm will skip if version already exists)
          for chart in charts/*/; do
            chart_name=$(basename "$chart")
            chart_version=$(grep '^version:' "$chart/Chart.yaml" | awk '{print $2}')
            package_name="${chart_name}-${chart_version}.tgz"

            # Only package if this version doesn't exist yet
            if [ ! -f "apruv-helmcharts/$package_name" ]; then
              echo "Packaging $chart_name version $chart_version"
              helm package "$chart" -d apruv-helmcharts/
            else
              echo "Skipping $chart_name - version $chart_version already packaged"
            fi
          done

      - name: Update Helm repo index
        run: |
          helm repo index ./

      - name: Commit and push changes
        run: |
          git add apruv-helmcharts/ index.yaml

          # Check if there are changes to commit
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: package helm charts [skip ci]"
            git push
          fi
