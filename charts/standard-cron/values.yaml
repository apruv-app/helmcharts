# Default values for standard-cron.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

suspend: false
restartPolicy: OnFailure

# CronJob spec
concurrencyPolicy: Forbid
# startingDeadlineSeconds: 120
successfulJobsHistoryLimit: 3
failedJobsHistoryLimit: 3
# timeZone: "America/Los_Angeles"

# Job spec
activeDeadlineSeconds: 7200
backoffLimit: 3

# Naming / identity
nameOverride: ""
fullnameOverride: ""
# serviceAccountName is the canonical key. `serviceAccount` is also accepted
# for backwards compatibility with releases written against chart < 0.2.0.
serviceAccountName: ""
serviceAccount: ""

# Pod
podAnnotations: {}
podSecurityContext: {}
securityContext: {}
nodeSelector: {}
tolerations: []
affinity: {}

# Containers
resources: {}
volumes: []
volumeMounts: []
extraContainers: []
extraInitContainers: []
imagePullSecrets: []
